<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta name="google-translate-custom-element" content="notranslate" />
    <title>KAAM - Agra Labor Connect</title>
    <script>
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { originalFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Unable to define safe fetch setter:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
